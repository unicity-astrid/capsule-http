[package]
name = "astrid-capsule-http"
version = "0.1.0"
description = "HTTP fetch tool for Astrid agents"
authors = ["Astrid Core Team"]
astrid-version = ">=0.1.0"

[[component]]
id = "http-tools"
file = "astrid_capsule_http.wasm"
type = "executable"

[capabilities]
net = ["*"]
ipc_publish = []

[[tool]]
name = "fetch_url"
description = "Fetch a URL over HTTP/HTTPS. Supports GET, POST, PUT, DELETE, PATCH, HEAD, and OPTIONS methods. Returns status code, response headers, and body. Private and local IPs are blocked (SSRF-safe)."
input_schema = { type = "object", properties = { url = { type = "string", description = "The URL to fetch (http:// or https:// only)" }, method = { type = "string", description = "HTTP method (GET, POST, PUT, DELETE, PATCH, HEAD, OPTIONS). Defaults to GET." }, headers = { type = "object", description = "Optional HTTP headers as key-value pairs", additionalProperties = { type = "string" } }, body = { type = "string", description = "Optional request body (for POST/PUT/PATCH)" } }, required = ["url"] }
